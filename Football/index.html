<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Football Manager</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#1f6f43" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180x180.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header>
    <h1>Football Manager</h1>
    <nav id="main-nav">
      <a href="#/team">Team</a>
      <a href="#/schedule">Schedule</a>
      <a href="#/roster">Roster</a>
      <a href="#/parents">Parents</a>
      <a href="#/communications">Communications</a>
      <a href="#/snacks">Snacks</a>
      <a href="#/fundraisers">Fundraisers</a>
      <a href="#/settings">Settings</a>
    </nav>
  </header>
  <div id="nudge-banner" hidden></div>
  <div id="hygiene-banner" hidden></div>
  <main id="outlet">Loading…</main>
  <footer id="theme-switcher" class="theme-switcher" aria-label="Color theme"></footer>
  <dialog id="wizard-dialog" class="wizard-dialog"></dialog>

  <script src="./js/vendor/xlsx.full.min.js"></script>
  <script src="./js/vendor/jspdf.umd.min.js"></script>
  <script type="module">
    import { seedIfNeeded } from './js/seed.js';
    import { initRouter } from './js/router.js';
    import { initNudgeBanner } from './js/nudge.js';
    import { initHygieneBanner } from './js/hygiene.js';
    import { initWizard } from './js/wizard.js';
    import { initTheme, initThemeSwitcher } from './js/theme.js';

    seedIfNeeded();
    initTheme();
    initThemeSwitcher(document.getElementById('theme-switcher'));
    initRouter(document.getElementById('outlet'), document.getElementById('main-nav'));
    initNudgeBanner(document.getElementById('nudge-banner'));
    initHygieneBanner(document.getElementById('hygiene-banner'));
    initWizard(document.getElementById('wizard-dialog'));

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
